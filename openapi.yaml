openapi: 3.0.3
info:
  title: wyze-bulb-rest-api-control
  version: 1.0.0
  description: |
    Local REST API for controlling Wyze bulbs from a computer.
    The API is local-facing, but the backend command path is still Wyze cloud-backed.
servers:
  - url: http://127.0.0.1:8787
paths:
  /status:
    get:
      summary: Health and capability summary
      responses:
        '200':
          description: OK
  /health:
    get:
      summary: Local service health and runtime readiness
      responses:
        '200':
          description: OK
  /capabilities:
    get:
      summary: List supported control capabilities and ranges
      responses:
        '200':
          description: OK
  /devices:
    get:
      summary: List configured device aliases
      responses:
        '200':
          description: OK
  /presets:
    get:
      summary: List effective presets for the default device or a specific alias
      parameters:
        - in: query
          name: device
          schema:
            type: string
          required: false
          description: Optional configured device alias
      responses:
        '200':
          description: OK
  /groups:
    get:
      summary: List configured groups
      responses:
        '200':
          description: OK
  /scenes:
    get:
      summary: List configured scenes
      responses:
        '200':
          description: OK
  /scene/{name}:
    get:
      summary: Get a configured scene definition by name
      parameters:
        - in: path
          name: name
          schema:
            type: string
          required: true
          description: Configured scene name
      responses:
        '200':
          description: OK
  /state:
    get:
      summary: Fetch current Wyze property state for a device
      parameters:
        - in: query
          name: device
          schema:
            type: string
          required: false
          description: Optional configured device alias
        - in: query
          name: pid
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          required: false
          description: Optional property IDs to request; defaults to the common light state IDs
      responses:
        '200':
          description: OK
  /on:
    post:
      summary: Turn on a device
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceTarget'
      responses:
        '200':
          description: OK
  /off:
    post:
      summary: Turn off a device
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceTarget'
      responses:
        '200':
          description: OK
  /toggle:
    post:
      summary: Toggle a device power state by first reading current state
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceTarget'
      responses:
        '200':
          description: OK
  /night:
    post:
      summary: Apply the night preset to a device
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceTarget'
      responses:
        '200':
          description: OK
  /dim:
    post:
      summary: Apply the dim preset to a device
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceTarget'
      responses:
        '200':
          description: OK
  /bright:
    post:
      summary: Apply the bright preset to a device
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceTarget'
      responses:
        '200':
          description: OK
  /preset/run:
    post:
      summary: Run a preset by name for a device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresetTarget'
      responses:
        '200':
          description: OK
  /brightness:
    post:
      summary: Set explicit brightness for a device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BrightnessTarget'
      responses:
        '200':
          description: OK
  /color-temperature:
    post:
      summary: Set explicit white color temperature for a device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ColorTemperatureTarget'
      responses:
        '200':
          description: OK
  /state/apply:
    post:
      summary: Apply power, brightness, and/or color temperature in one request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StateApplyTarget'
      responses:
        '200':
          description: OK
  /transition:
    post:
      summary: Emulate a local brightness or color-temperature transition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionRequest'
      responses:
        '200':
          description: OK
  /properties:
    post:
      summary: Set one or more raw Wyze properties for a device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyListTarget'
      responses:
        '200':
          description: OK
  /group/on:
    post:
      summary: Turn on a configured group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupTarget'
      responses:
        '200':
          description: OK
  /group/off:
    post:
      summary: Turn off a configured group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupTarget'
      responses:
        '200':
          description: OK
  /group/brightness:
    post:
      summary: Set explicit brightness for a configured group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupBrightnessTarget'
      responses:
        '200':
          description: OK
  /scene/run:
    post:
      summary: Run a configured scene by name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SceneTarget'
      responses:
        '200':
          description: OK
  /scene/evening:
    post:
      summary: Run the configured evening scene
      responses:
        '200':
          description: OK
  /scene/off:
    post:
      summary: Run the configured off scene
      responses:
        '200':
          description: OK
  /scene/validate:
    post:
      summary: Validate a local scene definition without saving it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SceneValidationRequest'
      responses:
        '200':
          description: OK
components:
  schemas:
    DeviceTarget:
      type: object
      properties:
        device:
          type: string
          example: living-room
    BrightnessTarget:
      type: object
      required:
        - brightness
      properties:
        device:
          type: string
          example: living-room
        brightness:
          type: integer
          minimum: 1
          maximum: 100
          example: 40
    PresetTarget:
      type: object
      required:
        - preset
      properties:
        device:
          type: string
          example: living-room
        preset:
          type: string
          example: bright
    GroupTarget:
      type: object
      required:
        - group
      properties:
        group:
          type: string
          example: all
    GroupBrightnessTarget:
      type: object
      required:
        - group
        - brightness
      properties:
        group:
          type: string
          example: all
        brightness:
          type: integer
          minimum: 1
          maximum: 100
          example: 25
    ColorTemperatureTarget:
      type: object
      required:
        - color_temperature
      properties:
        device:
          type: string
          example: living-room
        color_temperature:
          type: integer
          minimum: 2700
          maximum: 6500
          example: 2700
    StateApplyTarget:
      type: object
      properties:
        device:
          type: string
          example: living-room
        power:
          type: string
          enum: [on, off]
          example: on
        brightness:
          type: integer
          minimum: 1
          maximum: 100
          example: 20
        color_temperature:
          type: integer
          minimum: 2700
          maximum: 6500
          example: 2700
    PropertyListTarget:
      type: object
      required:
        - properties
      properties:
        device:
          type: string
          example: living-room
        properties:
          type: array
          items:
            $ref: '#/components/schemas/PropertyAssignment'
    PropertyAssignment:
      type: object
      required:
        - pid
        - pvalue
      properties:
        pid:
          type: string
          example: P1502
        pvalue:
          oneOf:
            - type: string
            - type: integer
          example: "2700"
    SceneTarget:
      type: object
      required:
        - scene
      properties:
        scene:
          type: string
          example: evening
    SceneValidationRequest:
      type: object
      required:
        - scene
      properties:
        scene:
          $ref: '#/components/schemas/SceneDefinition'
    SceneDefinition:
      type: object
      required:
        - target
        - commands
      properties:
        target:
          type: string
          example: all
        commands:
          type: array
          items:
            $ref: '#/components/schemas/SceneCommand'
    SceneCommand:
      type: object
      required:
        - command
      properties:
        command:
          type: string
          enum: [on, off, brightness, color-temperature, properties]
          example: brightness
        value:
          oneOf:
            - type: integer
            - type: string
          example: 25
        properties:
          type: array
          items:
            $ref: '#/components/schemas/PropertyAssignment'
    TransitionRequest:
      type: object
      properties:
        device:
          type: string
          example: living-room
        duration_ms:
          type: integer
          minimum: 0
          example: 3000
        steps:
          type: integer
          minimum: 1
          example: 6
        brightness:
          $ref: '#/components/schemas/TransitionRangeBrightness'
        color_temperature:
          $ref: '#/components/schemas/TransitionRangeColorTemperature'
    TransitionRangeBrightness:
      type: object
      required:
        - from
        - to
      properties:
        from:
          type: integer
          minimum: 1
          maximum: 100
          example: 10
        to:
          type: integer
          minimum: 1
          maximum: 100
          example: 80
    TransitionRangeColorTemperature:
      type: object
      required:
        - from
        - to
      properties:
        from:
          type: integer
          minimum: 2700
          maximum: 6500
          example: 2700
        to:
          type: integer
          minimum: 2700
          maximum: 6500
          example: 6500
